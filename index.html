<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuTon Clínico</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4CAF50">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

    <style>
        :root { --primary: #4CAF50; --secondary: #00BFA5; --bg: #f0f4f3; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            color: var(--text); 
            min-height: 100vh; 
        }

        .app-card { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px); 
            border-radius: 24px; 
            padding: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border: 1px solid rgba(255,255,255,0.4); 
            height: fit-content; 
        }

        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin: 0 0 20px; letter-spacing: -0.5px; }
        
        .section { 
            background: white; 
            border-radius: 16px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            border: 1px solid #f0f0f0;
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #7f8c8d; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #e0e6e6; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none; 
            background: #fafafa; 
            color: var(--text); 
            transition: all 0.2s;
        }

        input:focus, textarea:focus, select:focus { border-color: var(--primary); background: white; }

        .btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 4px 15px rgba(76,175,80,0.2); 
        }

        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-dark { background: linear-gradient(135deg, #34495e, #2c3e50); }

        .status { 
            text-align: center; 
            font-size: 0.85rem; 
            margin-top: 12px; 
            padding: 10px; 
            border-radius: 10px; 
            font-weight: 600; 
            display: none; 
        }
        .status.ok { background: #e8f5e9; color: #2e7d32; }
        .status.erro { background: #fdecea; color: #c62828; }

        .historico-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .badge { float: right; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .badge-N { background: #fdecea; color: #c62828; }
        .badge-P { background: #fff3e0; color: #e65100; }
        .badge-M { background: #e8f5e9; color: #2e7d32; }

        #lista_historico { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .empty-msg { text-align: center; color: #bdc3c7; font-size: 0.85rem; padding: 15px 0; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🌱 MeuTon Clínico</h1>

    <div class="section">
        <label>👤 Nome do Paciente</label>
        <input type="text" id="pac_id" placeholder="Ex: Maria ou Katharina" autocomplete="off">
    </div>

    <div class="section">
        <label>📊 Avaliação DEMUCA</label>
        <select id="res_demuca">
            <option value="N">Não atingido (N)</option>
            <option value="P">Parcial (P)</option>
            <option value="M">Masterizado (M)</option>
        </select>
        <button class="btn" onclick="salvarAval()">💾 Salvar Avaliação</button>
    </div>

    <div class="section">
        <label>📝 Parecer / Evolução</label>
        <textarea id="obs_clinica" rows="3" placeholder="Notas da sessão..."></textarea>
        <button class="btn btn-dark" onclick="salvarRel()">📋 Atualizar Prontuário</button>
    </div>

    <div class="section">
        <label>🕓 Histórico</label>
        <input type="text" id="busca_pac" placeholder="Buscar histórico..." oninput="buscarHistorico()" autocomplete="off">
        <div id="lista_historico">
            <p class="empty-msg">Inicie a busca pelo nome</p>
        </div>
    </div>

    <div id="status_msg" class="status"></div>
</div>

<script>
    // INICIALIZAÇÃO SEGURA DO SUPABASE
    const URL_DB = 'https://uymtfwhjxvlwuacvonqr.supabase.co';
    const KEY_DB = 'sb_publishable_kWdyvs-QoKzRfhr_jUWh3g_TCuHTeym';
    
    // Usando window.supabase para garantir compatibilidade com navegador
    const _supabase = window.supabase.createClient(URL_DB, KEY_DB);

    const msgElement = document.getElementById('status_msg');

    function mostrarStatus(texto, tipo = 'ok') {
        msgElement.textContent = (tipo === 'ok' ? '✅ ' : '❌ ') + texto;
        msgElement.className = 'status ' + tipo;
        msgElement.style.display = 'block';
        setTimeout(() => { msgElement.style.display = 'none'; }, 3500);
    }

    async function salvarAval() {
        const id = document.getElementById('pac_id').value.trim();
        const resp = document.getElementById('res_demuca').value;
        if (!id) return mostrarStatus("Digite o nome do paciente.", 'erro');

        const { error } = await _supabase.from('demuca_avaliacoes').insert([{ paciente_id: id, respostas: resp }]);
        if (error) {
            console.error(error);
            mostrarStatus("Erro ao salvar. Verifique o RLS.", 'erro');
        } else {
            mostrarStatus("Avaliação salva!");
            buscarHistorico(); // Atualiza a lista se estiver buscando
        }
    }

    async function salvarRel() {
        const id = document.getElementById('pac_id').value.trim();
        const texto = document.getElementById('obs_clinica').value.trim();
        if (!id || !texto) return mostrarStatus("Preencha nome e observação.", 'erro');

        // Upsert precisa de uma coluna única (paciente_id) configurada no Supabase como UNIQUE
        const { error } = await _supabase.from('relatorios').upsert({ paciente_id: id, observacao: texto });
        if (error) {
            console.error(error);
            mostrarStatus("Erro ao atualizar prontuário.", 'erro');
        } else {
            mostrarStatus("Prontuário atualizado!");
            document.getElementById('obs_clinica').value = "";
        }
    }

    let buscaTimer;
    function buscarHistorico() {
        clearTimeout(buscaTimer);
        const nome = document.getElementById('busca_pac').value.trim();
        const lista = document.getElementById('lista_historico');

        if (!nome) { 
            lista.innerHTML = '<p class="empty-msg">Inicie a busca pelo nome</p>'; 
            return; 
        }

        buscaTimer = setTimeout(async () => {
            const { data, error } = await _supabase.from('demuca_avaliacoes')
                .select('paciente_id, respostas, created_at')
                .ilike('paciente_id', `%${nome}%`)
                .order('created_at', { ascending: false })
                .limit(10);

            if (error) {
                lista.innerHTML = '<p class="empty-msg">Erro na busca.</p>';
                return;
            }

            if (!data || data.length === 0) {
                lista.innerHTML = '<p class="empty-msg">Nada encontrado.</p>';
                return;
            }

            lista.innerHTML = data.map(item => {
                const data_fmt = new Date(item.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
                const labels = { N: 'N', P: 'P', M: 'M' };
                return `
                <div class="historico-item">
                    <strong>${item.paciente_id}</strong>
                    <span class="badge badge-${item.respostas}">${labels[item.respostas]}</span>
                    <br><small style="color:#aaa">${data_fmt}</small>
                </div>`;
            }).join('');
        }, 500);
    }
</script>

</body>
</html>
